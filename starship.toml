# Don't print a new line at the start of the prompt
add_newline = false

# Prompt format
format = """
$cmd_duration $directory$git_branch
$character"""

[fill]
symbol = '-'
style = 'fg:#1a1a1a'

[character]
success_symbol = "[о©ұ пҒӢ](bold #ece9ff)"
error_symbol = "[пҖҚ пҒӢ](bold #e67e80)"

[package]
disabled = true

[git_branch]
style = "bg:#1a1a1a fg:#ece9ff"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold #1a1a1a)[$symbol $branch(:$remote_branch)]($style)[оӮҙ ](bold #1a1a1a)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[($state( $progress_current of $progress_total))]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold #dbbc7f)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ·вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++($count)](#ece9ff)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format = "[вҖў$hostname](bg:#1a1a1a fg:#ece9ff)[оӮҙ](bold #1a1a1a)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true

[time]
disabled = true

[username]
style_user = "bold bg:#1a1a1a fg:#ece9ff"
style_root = "bold bg:#e67e80 fg:#1e2326"
format = "[оӮ¶](bold #1a1a1a)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:#1a1a1a fg:#ece9ff"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold #1a1a1a)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold #1a1a1a)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold #1a1a1a)[у°Әў $duration](bold bg:#1a1a1a fg:#ece9ff)[оӮҙ](bold #1a1a1a)'
